# Dokploy deployment for Nuzah (piscine-chelles)

name: nuzah

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "50m"
    max-file: "3"

services:
  frontend:
    container_name: nuzah-frontend
    build:
      context: .
      dockerfile: Dockerfile
      target: production
      args:
        VITE_UMAMI_URL: ${VITE_UMAMI_URL:-}
        VITE_UMAMI_WEBSITE_ID: ${VITE_UMAMI_WEBSITE_ID:-}
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://127.0.0.1/"]
      interval: 30s
      timeout: 3s
      start_period: 5s
      retries: 3
    ports:
      - "31847:80"
    labels:
      - "traefik.enable=false"
    networks:
      - dokploy-network
    logging: *default-logging
    restart: always

networks:
  dokploy-network:
    external: true
